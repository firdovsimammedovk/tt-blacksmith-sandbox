# DISCLAIMER: This produces -inf in the loss.
# TODO(pglusac): https://github.com/tenstorrent/tt-blacksmith/issues/542

# Dataset settings
dataset_id: "sst2"

# Model settings
model_name: "openai/gpt-oss-20b"
max_length: 128
dtype: "torch.bfloat16"

# Training hyperparameters
training_type: "lora"
learning_rate: 1e-4
gradient_accumulation_steps: 4
batch_size: 1
num_epochs: 1
ignored_index: -100

# LoRA setup
lora_r: 32
lora_alpha: 64
lora_target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]
lora_task_type: "CAUSAL_LM"

# Device settings
mesh_shape: [1, 8]
mesh_axis_names: ["batch", "fsdp"]
input_sharding_dim: null

# Reproducibility settings
seed: 23
deterministic: False

# Logging settings
log_level: "INFO"
use_wandb: True
wandb_project: "gpt-oss-20b-lora"
wandb_run_name: "tt-gpt-oss-20b-test"
wandb_tags: ["test"]
wandb_watch_mode: "all"
wandb_log_freq: 1000
model_to_wandb: False
steps_freq: 1
val_steps_freq: 10
epoch_freq: 1

# Checkpoint settings
resume_from_checkpoint: False
resume_option: "last"
checkpoint_path: ""
checkpoint_metric: "eval/loss"
checkpoint_metric_mode: "min"
keep_last_n: 2
keep_best_n: 1
save_strategy: "step"
project_dir: "blacksmith/experiments/torch/gpt_oss"
save_optim: True
storage_backend: "local"
sync_to_storage: False
load_from_storage: False
remote_path: ""

# Other settings
framework: "pytorch"
print_examples: True
use_tt: True
